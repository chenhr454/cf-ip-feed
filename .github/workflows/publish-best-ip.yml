name: Publish Best CF IP Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CloudflareST
        shell: bash
        run: |
          set -euo pipefail

          ASSET_URL=$(curl -fsSL https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest \
            | grep browser_download_url \
            | grep 'linux_amd64.tar.gz' \
            | head -n 1 \
            | cut -d '"' -f 4)

          echo "ASSET_URL=$ASSET_URL"
          wget -O cfst.tar.gz "$ASSET_URL"

          mkdir -p cfst_dir
          tar -zxf cfst.tar.gz -C cfst_dir

          echo "==== extracted files ===="
          find cfst_dir -type f | sed 's#^#- #'

          BIN=$(find cfst_dir -type f \( -name "CloudflareST" -o -name "cfst" -o -name "CloudflareST_linux_amd64" \) | head -n 1 || true)
          if [ -z "${BIN:-}" ]; then
            BIN=$(find cfst_dir -type f -executable | head -n 1 || true)
          fi
          [ -z "${BIN:-}" ] && { echo "CloudflareST binary not found"; exit 1; }

          chmod +x "$BIN"
          cp "$BIN" ./CloudflareST
          chmod +x ./CloudflareST

          # 关键：准备 IPv4/IPv6 的 ip 列表文件
          V4=$(find cfst_dir -type f -name "ip.txt" | head -n 1 || true)
          V6=$(find cfst_dir -type f \( -name "ipv6.txt" -o -name "ipv6*.txt" \) | head -n 1 || true)

          if [ -n "${V4:-}" ]; then
            cp "$V4" ./ip.txt
          else
            curl -fsSL -o ip.txt https://raw.githubusercontent.com/XIU2/CloudflareSpeedTest/master/ip.txt
          fi

          if [ -n "${V6:-}" ]; then
            cp "$V6" ./ipv6.txt
          else
            # 没有就创建空文件，IPv6 步骤里会自动容错
            touch ipv6.txt
          fi

          ls -lah

      - name: Run IPv4
        run: |
          ./CloudflareST -f ip.txt -n 200 -t 10 -o result_v4.csv
          head -n 5 result_v4.csv

      - name: Run IPv6
        run: |
          set +e
          if [ -s ipv6.txt ]; then
            ./CloudflareST -6 -f ipv6.txt -n 200 -t 10 -o result_v6.csv
            head -n 5 result_v6.csv || true
          else
            echo "No ipv6.txt, skip v6 test."
            echo 'IP,RTT,Loss' > result_v6.csv
          fi
          exit 0

      - name: Build JSON
        run: |
          mkdir -p public
          BEST_V4=$(awk -F',' 'NR==2{gsub(/"/,"",$1); print $1}' result_v4.csv)
          [ -z "$BEST_V4" ] && BEST_V4="1.1.1.1"
          BEST_V6=$(awk -F',' 'NR==2{gsub(/"/,"",$1); print $1}' result_v6.csv 2>/dev/null || true)

          cat > public/v4.json <<EOF
          {"status":true,"code":200,"info":{"CN":[{"ip":"$BEST_V4","latency":0,"loss":0}],"CT":[],"CU":[],"CM":[]}}
          EOF

          if [ -n "$BEST_V6" ]; then
            cat > public/v6.json <<EOF
          {"status":true,"code":200,"info":{"CN":[{"ip":"$BEST_V6","latency":0,"loss":0}],"CT":[],"CU":[],"CM":[]}}
          EOF
          else
            cat > public/v6.json <<EOF
          {"status":true,"code":200,"info":{"CN":[],"CT":[],"CU":[],"CM":[]}}
          EOF
          fi

      - name: Publish pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
