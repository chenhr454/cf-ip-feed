      - name: Build API JSON (Top10)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public

          python3 - <<'PY'
          import csv, json, os
          from datetime import datetime, timezone

          def parse_top(csv_file, n=10):
              out = []
              if not os.path.exists(csv_file):
                  return out

              with open(csv_file, "r", encoding="utf-8", errors="ignore", newline="") as f:
                  reader = csv.reader(f)
                  next(reader, None)  # 跳过表头
                  for row in reader:
                      if not row:
                          continue
                      ip = (row[0] or "").replace('"', '').strip()
                      if not ip or ip.upper() == "IP":
                          continue

                      # 兼容不同列格式：尽量取到延迟/丢包，取不到就给0
                      latency = 0
                      loss = 0
                      try:
                          if len(row) > 4:
                              latency = float((row[4] or "0").replace('"','').strip() or 0)
                          elif len(row) > 1:
                              latency = float((row[1] or "0").replace('"','').strip() or 0)
                      except:
                          latency = 0

                      try:
                          if len(row) > 3:
                              loss = float((row[3] or "0").replace('"','').strip() or 0)
                      except:
                          loss = 0

                      out.append({
                          "ip": ip,
                          "latency": latency,
                          "loss": loss
                      })
                      if len(out) >= n:
                          break
              return out

          v4_list = parse_top("result_v4.csv", 10)
          v6_list = parse_top("result_v6.csv", 10)

          os.makedirs("public", exist_ok=True)

          with open("public/v4.json", "w", encoding="utf-8") as f:
              json.dump(
                  {"status": True, "code": 200, "info": {"CN": v4_list, "CT": [], "CU": [], "CM": []}},
                  f, ensure_ascii=False, separators=(",", ":")
              )

          with open("public/v6.json", "w", encoding="utf-8") as f:
              json.dump(
                  {"status": True, "code": 200, "info": {"CN": v6_list, "CT": [], "CU": [], "CM": []}},
                  f, ensure_ascii=False, separators=(",", ":")
              )

          best_v4 = v4_list[0]["ip"] if v4_list else ""
          best_v6 = v6_list[0]["ip"] if v6_list else ""

          with open("public/latest.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "updated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                      "best_v4": best_v4,
                      "best_v6": best_v6
                  },
                  f, ensure_ascii=False, separators=(",", ":")
              )
          PY

          echo "==== public files ===="
          ls -lah public
          cat public/v4.json
          cat public/v6.json
