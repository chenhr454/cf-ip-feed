name: Publish Best CF IP Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CFST (official)
        shell: bash
        run: |
          set -euo pipefail
          TAG=$(curl -fsSL https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep '"tag_name"' | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Latest tag: $TAG"

          wget -O cfst_linux_amd64.tar.gz "https://github.com/XIU2/CloudflareSpeedTest/releases/download/${TAG}/cfst_linux_amd64.tar.gz"
          tar -zxf cfst_linux_amd64.tar.gz
          chmod +x cfst

          echo "==== files ===="
          ls -lah

      - name: Run IPv4 test (with speed)
        shell: bash
        run: |
          set -euo pipefail
          ./cfst -f ip.txt -httping -n 200 -t 10 -o result_v4.csv
          echo "==== result_v4.csv ===="
          head -n 5 result_v4.csv || true

      - name: Run IPv6 test (with speed, optional)
        shell: bash
        run: |
          set +e
          if [ -f ipv6.txt ]; then
            ./cfst -f ipv6.txt -httping -n 200 -t 10 -o result_v6.csv
            echo "==== result_v6.csv ===="
            head -n 5 result_v6.csv || true
          else
            echo 'IP,RTT,Loss' > result_v6.csv
          fi
          exit 0

      - name: Build API JSON
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public

          BEST_V4=$(tail -n +2 result_v4.csv | head -n 1 | cut -d',' -f1 | tr -d '\r"')
          if [ -z "${BEST_V4:-}" ]; then
            BEST_V4=$(head -n 1 ip.txt | tr -d '\r')
          fi

          BEST_V6=$(tail -n +2 result_v6.csv | head -n 1 | cut -d',' -f1 | tr -d '\r"' || true)

          cat > public/v4.json <<EOF
          {"status":true,"code":200,"info":{"CN":[{"ip":"$BEST_V4","latency":0,"loss":0}],"CT":[],"CU":[],"CM":[]}}
          EOF

          if [ -n "${BEST_V6:-}" ]; then
            cat > public/v6.json <<EOF
          {"status":true,"code":200,"info":{"CN":[{"ip":"$BEST_V6","latency":0,"loss":0}],"CT":[],"CU":[],"CM":[]}}
          EOF
          else
            cat > public/v6.json <<EOF
          {"status":true,"code":200,"info":{"CN":[],"CT":[],"CU":[],"CM":[]}}
          EOF
          fi

          cat > public/latest.json <<EOF
          {"updated_at":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")","best_v4":"$BEST_V4","best_v6":"${BEST_V6:-}"}
          EOF

          echo "==== public ===="
          ls -lah public
          cat public/v4.json
          cat public/v6.json

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
